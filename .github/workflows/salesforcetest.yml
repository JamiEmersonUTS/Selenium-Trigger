name: Trigger UAT Smoke Tests (Manual)

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch or tag in uts-itd/UTS_dotnet8_MultiPlatformAutomation to run"
        required: true
        default: "master"

jobs:
  trigger-smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Set target repo values
        run: |
          set -euo pipefail
          echo "TARGET_REPO=uts-itd/UTS_dotnet8_MultiPlatformAutomation" >> "$GITHUB_ENV"
          echo "WORKFLOW_FILE=salesforcesmoketests.yml" >> "$GITHUB_ENV"
          echo "TARGET_REF=${{ github.event.inputs.target_ref }}" >> "$GITHUB_ENV"

      - name: Trigger salesforcesmoketests.yml in target repo
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_WORKFLOW_TOKEN }}
        run: |
          set -euo pipefail
          gh auth status
          gh workflow run "$WORKFLOW_FILE" \
            --repo "$TARGET_REPO" \
            --ref "$TARGET_REF"

      - name: Confirm dispatch request
        run: |
          echo "Triggered $WORKFLOW_FILE in $TARGET_REPO on ref $TARGET_REF"
